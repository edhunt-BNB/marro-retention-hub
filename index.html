function processData(){DATA.pauses=[];DATA.weeklyStats={};DATA.repStats={};DATA.raw.forEach(function(row,idx){if(idx===0)return;var retained=getSafe(row,CONFIG.COLS.RETAINED);if(retained.toUpperCase()==='TRUE')return;var pauseDate=getSafe(row,CONFIG.COLS.PAUSE_DATE);if(!pauseDate)return;var box2Date=getSafe(row,CONFIG.COLS.BOX2_DATE);if(box2Date)return;var b1pVal=getSafe(row,CONFIG.COLS.B1P_BG)||getSafe(row,CONFIG.COLS.B1P);var category=categorizeB1P(b1pVal);var pauseDt=parseDate(pauseDate);var pauseWeek=getWeekNumber(pauseDt);if(!pauseWeek||pauseWeek<1||pauseWeek>52)return;var salesRep=getSafe(row,CONFIG.COLS.SALES_REP);if(!salesRep)return;var pause={week:pauseWeek,rep:salesRep,customer:getSafe(row,CONFIG.COLS.CUSTOMER_NAME),phone:getSafe(row,CONFIG.COLS.PHONE),pauseDate:pauseDate,b1p:b1pVal||'N/A',category:category,mainReason:getSafe(row,CONFIG.COLS.MAIN_REASON),subReason:getSafe(row,CONFIG.COLS.SUB_REASON),createdDate:getSafe(row,CONFIG.COLS.CREATED_DATE)};DATA.pauses.push(pause);if(!DATA.weeklyStats[pauseWeek])DATA.weeklyStats[pauseWeek]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0,byRep:{}};var ws=DATA.weeklyStats[pauseWeek];ws.total++;ws[category]++;if(!ws.byRep[salesRep])ws.byRep[salesRep]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};ws.byRep[salesRep].total++;ws.byRep[salesRep][category]++;if(!DATA.repStats[salesRep])DATA.repStats[salesRep]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0,byWeek:{},reasons:{},subReasons:{}};var rs=DATA.repStats[salesRep];rs.total++;rs[category]++;if(!rs.byWeek[pauseWeek])rs.byWeek[pauseWeek]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};rs.byWeek[pauseWeek].total++;rs.byWeek[pauseWeek][category]++;if(pause.mainReason)rs.reasons[pause.mainReason]=(rs.reasons[pause.mainReason]||0)+1;if(pause.subReason)rs.subReasons[pause.subReason]=(rs.subReasons[pause.subReason]||0)+1;});DATA.weeks=Object.keys(DATA.weeklyStats).map(Number).sort(functi function generateTeamCommentary(){var weeks=DATA.weeks;if(weeks.length<2)return'<p>Insufficient data.</p>';var latest=DATA.weeklyStats[weeks[weeks.length-1]];var prev=DATA.weeklyStats[weeks[weeks.length-2]];var diff=latest.cdPct-prev.cdPct;var totalCD=DATA.pauses.filter(function(p){return p.category==='Critical'||p.category==='Danger';}).length;var teamCDPct=DATA.pauses.length>0?(totalCD/DATA.pauses.length*100):0;var lw=weeks[weeks.length-1];var repPerf=Object.entries(DATA.weeklyStats[lw].byRep).map(function(e){return{rep:e[0],pct:e[1].total>0?((e[1].Critical+e[1].Danger)/e[1].total*100):0,total:e[1].total};}).sort(function(a,b){return a.pct-b.pct;});var best=repPerf[0];var worst=repPerf[repPerf.length-1];var html='<h4>Week '+lw+' Analysis</h4><ul>';html+='<li>C+D rate '+(diff>2?'<span class="negative">worsened</span>':diff<-2?'<span class="positive">improved</span>':'<span class="neutral">held steady</span>')+' at <span class="highlight">'+latest.cdPct.toFixed(1)+'%</span> ('+(diff>0?'+':'')+diff.toFixed(1)+'pp vs W'+weeks[weeks.length-2]+')</li>';html+='<li>Volume: <span class="highlight">'+latest.total+'</span> ('+latest.Critical+'C/'+latest.Danger+'D/'+latest['Likely Reminder']+'LR/'+latest['Needs Reviewing']+'NR)</li>';html+='<li>YTD team avg: <span class="highlight">'+teamCDPct.toFixed(1)+'%</span> across '+DATA.pauses.length+' pauses</li>';if(best&&worst&&best.rep!==worst.rep)html+='<li>Best: <span class="positive">'+best.rep+'</span> ('+best.pct.toFixed(0)+'%) | Needs attention: <span class="negative">'+worst.rep+'</span> ('+worst.pct.toFixed(0)+'%)</li>';html+='</ul>';return html;}
function generateRepCommentary(rep,week){var rs=DATA.repStats[rep];var ws=DATA.weeklyStats[week]?.byRep[rep]||{total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};var ytdPct=rs.total>0?((rs.Critical+rs.Danger)/rs.total*100):0;var weekPct=ws.total>0?((ws.Critical+ws.Danger)/ws.total*100):0;var teamPct=DATA.weeklyStats[week]?DATA.weeklyStats[week].cdPct:0;var vsTeam=weekPct-teamPct;var rw=Object.keys(rs.byWeek).map(Number).sort(function(a,b){return a-b;});var recent=rw.slice(-3);var earlier=rw.slice(0,Math.max(1,rw.length-3));var recentPct=0,earlierPct=0;if(recent.length){var rCD=recent.reduce(function(s,w){return s+(rs.byWeek[w]?.Critical||0)+(rs.byWeek[w]?.Danger||0);},0);var rT=recent.reduce(function(s,w){return s+(rs.byWeek[w]?.total||0);},0);recentPct=rT>0?(rCD/rT*100):0;}if(earlier.length){var eCD=earlier.reduce(function(s,w){return s+(rs.byWeek[w]?.Critical||0)+(rs.byWeek[w]?.Danger||0);},0);var eT=earlier.reduce(function(s,w){return s+(rs.byWeek[w]?.total||0);},0);earlierPct=eT>0?(eCD/eT*100):0;}var trending=recentPct>earlierPct+5?'worsening':(recentPct<earlierPct-5?'improving':'stable');var topReasons=Object.entries(rs.reasons).sort(function(a,b){return b[1]-a[1];}).slice(0,3);var html='<h4>'+rep+' &mdash; Week '+week+'</h4><ul>';html+='<li>This week: <span class="highlight">'+weekPct.toFixed(1)+'% C+D</span> ('+(ws.Critical+ws.Danger)+'/'+ws.total+') '+(vsTeam>5?'<span class="negative">'+vsTeam.toFixed(1)+'pp above team</span>':vsTeam<-5?'<span class="positive">'+Math.abs(vsTeam).toFixed(1)+'pp below team</span>':'<span class="neutral">in line with team</span>')+'</li>';html+='<li>YTD: <span class="highlight">'+ytdPct.toFixed(1)+'%</span> ('+(rs.Critical+rs.Danger)+'/'+rs.total+')</li>';html+='<li>Trend: <span class="'+(trending==='worsening'?'negative':trending==='improving'?'positive':'neutral')+'">'+trending+'</span> ('+recentPct.toFixed(1)+'% recent vs '+earlierPct.toFixed(1)+'% earlier)</li>';if(topReasons.length)html+='<li>Top reasons: '+topReasons.map(function(r){return'<strong>'+r[0]+'</strong> ('+r[1]+')';}).join(', ')+'</li>';html+='</ul>';return html;}
function renderTeamOverview(){var c=document.getElementById('team-overview');var total=DATA.pauses.length;var tC=DATA.pauses.filter(function(p){return p.category==='Critical';}).length;var tD=DATA.pauses.filter(function(p){return p.category==='Danger';}).length;var tLR=DATA.pauses.filter(function(p){return p.category==='Likely Reminder';}).length;var tNR=DATA.pauses.filter(function(p){return p.category==='Needs Reviewing';}).length;var cdP=pct(tC+tD,total);var lw=DATA.weeks[DATA.weeks.length-1];var pw=DATA.weeks.length>1?DATA.weeks[DATA.weeks.length-2]:null;var lws=DATA.weeklyStats[lw]||{};var pws=pw?DATA.weeklyStats[pw]:null;var lcd=lws.cdPct||0;var pcd=pws?pws.cdPct:lcd;var td=(lcd-pcd).toFixed(1);var tdir=td>2?'up':td<-2?'down':'flat';var ti=tdir==='up'?'&#9650;':tdir==='down'?'&#9660;':'&#8776;';var ac=lcd>=70?'alert-danger':lcd>=50?'alert-warning':'alert-success';var am=lcd>=70?'Critical: '+lcd.toFixed(1)+'% C+D in W'+lw:lcd>=50?'Elevated: '+lcd.toFixed(1)+'% C+D in W'+lw:'Acceptable: '+lcd.toFixed(1)+'% C+D in W'+lw;c.innerHTML='<div class="alert '+ac+'"><span class="alert-icon">'+(lcd>=50?'&#9888;&#65039;':'&#9989;')+'</span><div><strong>'+am+'</strong> <span style="font-size:.85rem">('+(lws.total||0)+': '+(lws.Critical||0)+'C/'+(lws.Danger||0)+'D/'+(lws['Likely Reminder']||0)+'LR/'+(lws['Needs Reviewing']||0)+'NR)</span></div></div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-value">'+total+'</div><div class="kpi-label">Total YTD</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-critical)">'+tC+'</div><div class="kpi-label">Critical</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-danger)">'+tD+'</div><div class="kpi-label">Danger</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-likely)">'+tLR+'</div><div class="kpi-label">Likely Reminder</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-reviewing)">'+tNR+'</div><div class="kpi-label">Needs Reviewing</div></div><div class="kpi-card"><div class="kpi-value">'+cdP+'%</div><div class="kpi-label">C+D Rate</div><div class="kpi-trend '+tdir+'">'+ti+' '+Math.abs(td)+'pp vs W'+(pw||'?')+'</div></div></div><div class="commentary">'+generateTeamCommentary()+'</div><div class="card"><h3>&#128202; Risk Scale</h3><div class="risk-scale"><div class="risk-band acceptable">Acceptable<small>&lt;35%</small></div><div class="risk-band monitor">Monitor<small>35-49%</small></div><div class="risk-band high">High Risk<small>&ge;50%</small></div></div><p style="font-size:.8rem;color:var(--mr-text-muted);margin-top:.5rem;text-align:center">Based on Critical+Danger rate. Critical=paused before Box 1. Danger=1-4 days after.</p></div><div class="grid-2"><div class="card"><h3>&#128202; Weekly Volume</h3><div class="chart-container"><canvas id="weeklyVolumeChart"></canvas></div><div class="commentary" id="volume-commentary"></div></div><div class="card"><h3>&#128200; Category Mix (%)</h3><div class="chart-container"><canvas id="weeklyStackedChart"></canvas></div><div class="commentary" id="mix-commentary"></div></div></div><div class="card"><h3>&#128101; Rep C+D Rate (YTD)</h3><div class="chart-container tall"><canvas id="repComparisonChart"></canvas></div><div class="commentary" id="rep-comparison-commentary"></div></div><div class="card"><h3>&#127991;&#65039; Rep Status</h3><div class="risk-scale" style="margin-bottom:1rem"><div class="risk-band acceptable">Acceptable<small>&lt;35%</small></div><div class="risk-band monitor">Monitor<small>35-49%</small></div><div class="risk-band high">High Risk<small>&ge;50%</small></div></div><div class="rep-grid" id="team-rep-grid"></div></div>';renderWeeklyVolumeChart();renderWeeklyStackedChart();renderRepComparisonChart();renderTeamRepGrid();}
function renderWeeklyVolumeChart(){destroyChart('wv');var ctx=document.getElementById('weeklyVolumeChart').getContext('2d');chartInstances['wv']=new Chart(ctx,{type:'bar',data:{labels:DATA.weeks.map(function(w){return'W'+w;}),datasets:[{label:'Critical',data:DATA.weeks.map(function(w){return DATA.weeklyStats[w].Critical;}),backgroundColor:'#96061C'},{label:'Danger',data:DATA.weeks.map(function(w){return DATA.weeklyStats[w].Danger;}),backgroundColor:'#E92A00'},{label:'Likely Reminder',data:DATA.weeks.map(function(w){return DATA.weeklyStats[w]['Likely Reminder'];}),backgroundColor:'#D69042'},{label:'Needs Reviewing',data:DATA.weeks.map(function(w){return DATA.weeklyStats[w]['Needs Reviewing'];}),backgroundColor:'#51BC51'}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}},plugins:{legend:{position:'bottom'},datalabels:{display:function(c){return c.dataset.data[c.dataIndex]>=3;},color:'#fff',font:{size:11,weight:'700'}}}}});var vols=DATA.weeks.map(function(w){return DATA.weeklyStats[w].total;});var el=document.getElementById('volume-commentary');if(el)el.innerHTML='<h4>Volume</h4><p>Last 3 weeks: '+vols.slice(-3).join(' &rarr; ')+'. Peak: W'+DATA.weeks[vols.indexOf(Math.max.apply(null,vols))]+' ('+Math.max.apply(null,vols)+').</p>';}
function renderWeeklyStackedChart(){destroyChart('ws');var ctx=document.getElementById('weeklyStackedChart').getContext('2d');chartInstances['ws']=new Chart(ctx,{type:'bar',data:{labels:DATA.weeks.map(function(w){return'W'+w;}),datasets:[{label:'Critical',data:DATA.weeks.map(function(w){var s=DATA.weeklyStats[w];return s.total>0?(s.Critical/s.total*100):0;}),backgroundColor:'#96061C'},{label:'Danger',data:DATA.weeks.map(function(w){var s=DATA.weeklyStats[w];return s.total>0?(s.Danger/s.total*100):0;}),backgroundColor:'#E92A00'},{label:'Likely Reminder',data:DATA.weeks.map(function(w){var s=DATA.weeklyStats[w];return s.total>0?(s['Likely Reminder']/s.total*100):0;}),backgroundColor:'#D69042'},{label:'Needs Reviewing',data:DATA.weeks.map(function(w){var s=DATA.weeklyStats[w];return s.total>0?(s['Needs Reviewing']/s.total*100):0;}),backgroundColor:'#51BC51'}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';}}}},plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.raw.toFixed(1)+'%';}}},datalabels:{display:function(c){return c.dataset.data[c.dataIndex]>=5;},formatter:function(v){return v>=5?Math.round(v)+'%':'';},color:'#fff',font:{size:11,weight:'700'}}}}});var el=document.getElementById('mix-commentary');if(el){var l=DATA.weeklyStats[DATA.weeks[DATA.weeks.length-1]];var nr=l.total>0?(l['Needs Reviewing']/l.total*100):0;el.innerHTML='<h4>Mix</h4><p>Needs Reviewing at <strong>'+nr.toFixed(1)+'%</strong>. '+(nr>30?'<span class="positive">Good later-stage proportion.</span>':'<span class="negative">Most pauses still early-stage.</span>')+'</p>';}}
function renderRepComparisonChart(){destroyChart('rc');var ctx=document.getElementById('repComparisonChart').getContext('2d');var rd=DATA.reps.map(function(rep){var rs=DATA.repStats[rep];return{rep:rep,pct:rs.total>0?((rs.Critical+rs.Danger)/rs.total*100):0,total:rs.total};}).sort(function(a,b){return b.pct-a.pct;});chartInstances['rc']=new Chart(ctx,{type:'bar',data:{labels:rd.map(function(d){return d.rep+' (n='+d.total+')';}),datasets:[{label:'C+D %',data:rd.map(function(d){return d.pct;}),backgroundColor:rd.map(function(d){return d.pct>=50?'#96061C':d.pct>=35?'#D69042':'#51BC51';}),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:{beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';}}},y:{ticks:{font:{weight:'600'}}}},plugins:{legend:{display:false},datalabels:{anchor:'end',align:'right',color:'#451219',font:{size:12,weight:'700'},formatter:function(v){return v.toFixed(1)+'%';}}}}});var el=document.getElementById('rep-comparison-commentary');if(el){var hr=rd.filter(function(d){return d.pct>=50;});var mo=rd.filter(function(d){return d.pct>=35&&d.pct<50;});var ac=rd.filter(function(d){return d.pct<35;});var avg=rd.reduce(function(s,d){return s+d.pct;},0)/rd.length;var html='<h4>Summary</h4><ul><li>Team avg: <strong>'+avg.toFixed(1)+'%</strong></li>';if(hr.length)html+='<li><span class="negative">High Risk ('+hr.length+'):</span> '+hr.map(function(d){return d.rep+' ('+d.pct.toFixed(0)+'%)';}).join(', ')+'</li>';if(mo.length)html+='<li><span class="neutral">Monitor ('+mo.length+'):</span> '+mo.map(function(d){return d.rep+' ('+d.pct.toFixed(0)+'%)';}).join(', ')+'</li>';if(ac.length)html+='<li><span class="positive">Acceptable ('+ac.length+'):</span> '+ac.map(function(d){return d.rep+' ('+d.pct.toFixed(0)+'%)';}).join(', ')+'</li>';html+='</ul>';el.innerHTML=html;}}
function renderTeamRepGrid(){var c=document.getElementById('team-rep-grid');c.innerHTML=DATA.reps.map(function(rep){var rs=DATA.repStats[rep];var p=rs.total>0?((rs.Critical+rs.Danger)/rs.total*100):0;return'<div class="rep-btn"><span style="font-weight:700">'+rep+'</span><span class="tag tag-'+getRepStatus(p)+'">'+getStatusLabel(getRepStatus(p))+'</span><span style="font-size:.8rem">'+rs.total+' &middot; '+p.toFixed(1)+'% C+D</span></div>';}).join('');}

function selectWeek(week){selectedWeek=week;selectedRep=null;document.getElementById('week-selector-view').style.display='none';document.getElementById('week-detail-view').style.display='block';document.getElementById('selected-week-num').textContent=week;document.getElementById('selected-week-dates').textContent=getWeekDates(week);renderWeekKPIs(week);renderWeekRepSidebar(week);var ws=DATA.weeklyStats[week];var pi=DATA.weeks.indexOf(week)-1;var pws=pi>=0?DATA.weeklyStats[DATA.weeks[pi]]:null;var el=document.getElementById('week-commentary');if(el){var html='<h4>Week '+week+'</h4><ul><li><strong>'+ws.total+'</strong> pauses: '+ws.Critical+'C/'+ws.Danger+'D/'+ws['Likely Reminder']+'LR/'+ws['Needs Reviewing']+'NR</li><li>C+D: <strong>'+ws.cdPct.toFixed(1)+'%</strong>';if(pws){var df=ws.cdPct-pws.cdPct;html+=' ('+(df>0?'+':'')+df.toFixed(1)+'pp vs W'+DATA.weeks[pi]+')';}html+='</li></ul>';el.innerHTML=html;}document.getElementById('week-rep-detail').innerHTML='<div class="card" style="text-align:center;padding:3rem;color:var(--mr-text-muted)"><p>&#128072; Select a rep</p></div>';}
