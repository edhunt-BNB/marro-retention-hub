<script>
const CONFIG={SHEET_ID:'1Pg-y7UErqMeOTbMBgBTz0MgsQ3vhm_irNmHM1RikGwU',SHEET_NAME:'Looker Pull',APPS_SCRIPT_URL:'https://script.google.com/macros/s/AKfycbyWQAUe1MgCLYVvAuXBHu6ZXmUSc-BlQQjBFOwZwRpNpPaIPtxW0eRK-h99_94uxOfE/exec',COLS:{BOX1_WEEK:0,CREATED_WEEK:1,SALES_REP:2,CREATED_DATE:3,CUSTOMER_NAME:4,EMAIL:5,PHONE:6,BOX1_DATE:7,BOX2_DATE:8,RETAINED:9,DAYS_TO_BOX2:10,BUYERS_REMORSE:11,PAUSE_DATE:12,SALE_TO_PAUSE:13,B1P:14,MAIN_REASON:15,PAUSE_REASON:16,SUB_REASON:17,B1P_BG:33},THRESHOLDS:{HIGH_RISK:50,MONITOR:35},B1P_CATS:{CRITICAL:{label:'Critical',color:'#96061C',max:0},DANGER:{label:'Danger',color:'#E92A00',min:1,max:4},LIKELY:{label:'Likely Reminder',color:'#D69042',value:5},REVIEWING:{label:'Needs Reviewing',color:'#51BC51',min:6}},WEEK1_START:new Date(2025,11,29)};
Chart.register(ChartDataLabels);Chart.defaults.plugins.datalabels={display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>0;},color:'#fff',font:{size:10,weight:'700',family:'Bricolage Grotesque'},formatter:function(v){return(!v||v===0)?'':Math.round(v);}};
let DATA={raw:[],pauses:[],weeklyStats:{},repStats:{},weeks:[],reps:[],teamAvg:{}};let selectedWeek=null,selectedRep=null;let chartInstances={};
function getSafe(row,idx){if(idx<row.length&&row[idx]!==null&&row[idx]!==undefined&&row[idx]!=='')return String(row[idx]).trim();return'';}
function categorizeB1P(b1pStr){if(!b1pStr)return'Needs Reviewing';const cleaned=b1pStr.replace(/,/g,'');const b1p=parseInt(cleaned);if(isNaN(b1p))return'Needs Reviewing';if(b1p<=0)return'Critical';if(b1p<=4)return'Danger';if(b1p===5)return'Likely Reminder';return'Needs Reviewing';}
function getB1PClass(cat){return{'Critical':'b1p-critical','Danger':'b1p-danger','Likely Reminder':'b1p-likely','Needs Reviewing':'b1p-reviewing'}[cat]||'';}
function getCatColor(cat){return{'Critical':CONFIG.B1P_CATS.CRITICAL.color,'Danger':CONFIG.B1P_CATS.DANGER.color,'Likely Reminder':CONFIG.B1P_CATS.LIKELY.color,'Needs Reviewing':CONFIG.B1P_CATS.REVIEWING.color}[cat]||'#816165';}
function parseDate(dateStr){if(!dateStr)return null;const s=String(dateStr);const parts=s.split('/');if(parts.length===3)return new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));return null;}
function formatDateDDMMYY(dateStr){const d=parseDate(dateStr);if(!d)return dateStr||'-';const dd=String(d.getDate()).padStart(2,'0');const mm=String(d.getMonth()+1).padStart(2,'0');const yy=String(d.getFullYear()).slice(-2);return dd+'/'+mm+'/'+yy;}

function getWeekDates(weekNum){const start=new Date(CONFIG.WEEK1_START);start.setDate(start.getDate()+(weekNum-1)*7);const end=new Date(start);end.setDate(end.getDate()+6);const fmt=d=>d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');return fmt(start)+' - '+fmt(end);}

function getStatusLabel(s){return{'high-risk':'High Risk','monitor':'Monitor','acceptable':'Acceptable'}[s]||s;}

async function fetchData(){try{let rows;if(CONFIG.APPS_SCRIPT_URL){const r=await fetch(CONFIG.APPS_SCRIPT_URL);const d=await r.json();rows=d.values||d;}else{const gvizUrl='https://docs.google.com/spreadsheets/d/'+CONFIG.SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(CONFIG.SHEET_NAME)+'&range=Z:BG';const r=await fetch(gvizUrl);const text=await r.text();const jsonStart=text.indexOf('{'),jsonEnd=text.lastIndexOf('}')+1;const d=JSON.parse(text.substring(jsonStart,jsonEnd));if(d.status==='error')throw new Error(d.errors?.[0]?.detailed_message||'Sheet access denied');rows=d.table.rows.map(row=>row.c.map(cell=>cell?(cell.v!==null?cell.v:''):''));}DATA.raw=rows;processData();}catch(error){console.error('Fetch error:',error);document.getElementById('loading').innerHTML='<div class="alert alert-danger"><span class="alert-icon">&#9888;&#65039;</span><div><strong>Error loading data:</strong> '+error.message+'</div></div>';}}
function processData(){DATA.pauses=[];DATA.weeklyStats={};DATA.repStats={};DATA.raw.forEach((row,idx)=>{if(idx===0)return;const retained=getSafe(row,CONFIG.COLS.RETAINED);if(retained.toUpperCase()==='TRUE')return;const pauseDate=getSafe(row,CONFIG.COLS.PAUSE_DATE);if(!pauseDate)return;const box2Date=getSafe(row,CONFIG.COLS.BOX2_DATE);if(box2Date)return;let b1pVal=getSafe(row,CONFIG.COLS.B1P_BG)||getSafe(row,CONFIG.COLS.B1P);const category=categorizeB1P(b1pVal);const pauseDt=parseDate(pauseDate);const pauseWeek=getWeekNumber(pauseDt);if(!pauseWeek||pauseWeek<1||pauseWeek>52)return;const salesRep=getSafe(row,CONFIG.COLS.SALES_REP);if(!salesRep)return;const pause={week:pauseWeek,rep:salesRep,customer:getSafe(row,CONFIG.COLS.CUSTOMER_NAME),phone:getSafe(row,CONFIG.COLS.PHONE),pauseDate:pauseDate,b1p:b1pVal||'N/A',category:category,mainReason:getSafe(row,CONFIG.COLS.MAIN_REASON),subReason:getSafe(row,CONFIG.COLS.SUB_REASON),createdDate:getSafe(row,CONFIG.COLS.CREATED_DATE)};DATA.pauses.push(pause);if(!DATA.weeklyStats[pauseWeek])DATA.weeklyStats[pauseWeek]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0,byRep:{}};const ws=DATA.weeklyStats[pauseWeek];ws.total++;ws[category]++;if(!ws.byRep[salesRep])ws.byRep[salesRep]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};ws.byRep[salesRep].total++;ws.byRep[salesRep][category]++;if(!DATA.repStats[salesRep])DATA.repStats[salesRep]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0,byWeek:{},reasons:{},subReasons:{}};const rs=DATA.repStats[salesRep];rs.total++;rs[category]++;if(!rs.byWeek[pauseWeek])rs.byWeek[pauseWeek]={total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};rs.byWeek[pauseWeek].total++;rs.byWeek[pauseWeek][category]++;if(pause.mainReason)rs.reasons[pause.mainReason]=(rs.reasons[pause.mainReason]||0)+1;if(pause.subReason)rs.subReasons[pause.subReason]=(rs.subReasons[pause.subReason]||0)+1;});DATA.weeks=Object.keys(DATA.weeklyStats).map(Number).sort((a,b)=>a-b);DATA.reps=Object.keys(DATA.repStats).sort();DATA.weeks.forEach(w=>{const ws=DATA.weeklyStats[w];ws.cdPct=ws.total>0?((ws.Critical+ws.Danger)/ws.total*100):0;});const latestWeek=DATA.weeks[DATA.weeks.length-1]||0;document.getElementById('data-freshness').textContent=DATA.pauses.length+' records | Weeks '+DATA.weeks[0]+'-'+latestWeek+' | '+DATA.reps.length+' active reps | Last updated: '+new Date().toLocaleDateString('en-GB');document.getElementById('loading').style.display='none';renderTeamOverview();renderWeekBreakdown();renderPauseAnalysis();}
function generateTeamCommentary(){const weeks=DATA.weeks;if(weeks.length<2)return'<p>Insufficient data for trend analysis.</p>';const latest=DATA.weeklyStats[weeks[weeks.length-1]];const prev=DATA.weeklyStats[weeks[weeks.length-2]];const latestCD=latest.cdPct;const prevCD=prev.cdPct;const diff=latestCD-prevCD;const totalCD=DATA.pauses.filter(p=>p.category==='Critical'||p.category==='Danger').length;const teamCDPct=DATA.pauses.length>0?(totalCD/DATA.pauses.length*100):0;const latestWeek=weeks[weeks.length-1];const repPerf=Object.entries(DATA.weeklyStats[latestWeek].byRep).map(([rep,s])=>({rep,pct:s.total>0?((s.Critical+s.Danger)/s.total*100):0,total:s.total})).sort((a,b)=>a.pct-b.pct);const best=repPerf[0];const worst=repPerf[repPerf.length-1];const volDiff=latest.total-prev.total;const volTrend=volDiff>2?'increased':(volDiff<-2?'decreased':'remained stable');let html='<h4>Week '+latestWeek+' Analysis</h4><ul>';html+='<li>The team\'s Critical+Danger rate '+(diff>2?'<span class="negative">worsened</span>':diff<-2?'<span class="positive">improved</span>':'<span class="neutral">held steady</span>')+' at <span class="highlight">'+latestCD.toFixed(1)+'%</span> ('+(diff>0?'+':'')+diff.toFixed(1)+'pp vs W'+weeks[weeks.length-2]+')</li>';html+='<li>Pause volume '+volTrend+' to <span class="highlight">'+latest.total+'</span> (from '+prev.total+') &mdash; '+latest.Critical+' Critical, '+latest.Danger+' Danger, '+latest['Likely Reminder']+' Likely Reminder, '+latest['Needs Reviewing']+' Needs Reviewing</li>';html+='<li>YTD team average C+D rate: <span class="highlight">'+teamCDPct.toFixed(1)+'%</span> across '+DATA.pauses.length+' total pauses</li>';if(best&&worst&&best.rep!==worst.rep)html+='<li>Best performer this week: <span class="positive">'+best.rep+'</span> ('+best.pct.toFixed(0)+'% C+D, n='+best.total+') | Needs attention: <span class="negative">'+worst.rep+'</span> ('+worst.pct.toFixed(0)+'% C+D, n='+worst.total+')</li>';const critTrend=weeks.slice(-3).map(w=>DATA.weeklyStats[w].Critical);if(critTrend.length>=3&&critTrend[2]>critTrend[1]&&critTrend[1]>critTrend[0])html+='<li class="negative">&#9888; Criticals rising for 3 consecutive weeks ('+critTrend.join(' &rarr; ')+')</li>';else if(critTrend.length>=3&&critTrend[2]<critTrend[1]&&critTrend[1]<critTrend[0])html+='<li class="positive">&#10003; Criticals declining for 3 consecutive weeks ('+critTrend.join(' &rarr; ')+')</li>';html+='</ul>';return html;}
function generateRepCommentary(rep,week){const rs=DATA.repStats[rep];const weekStats=DATA.weeklyStats[week]?.byRep[rep]||{total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};const ytdCD=rs.Critical+rs.Danger;const ytdPct=rs.total>0?(ytdCD/rs.total*100):0;const weekCD=weekStats.Critical+weekStats.Danger;const weekPct=weekStats.total>0?(weekCD/weekStats.total*100):0;const teamWeek=DATA.weeklyStats[week];const teamPct=teamWeek?teamWeek.cdPct:0;const vsTeam=weekPct-teamPct;const repWeeks=Object.keys(rs.byWeek).map(Number).sort((a,b)=>a-b);const recent=repWeeks.slice(-3);const earlier=repWeeks.slice(0,Math.max(1,repWeeks.length-3));let recentPct=0,earlierPct=0;if(recent.length){const rCD=recent.reduce((s,w)=>s+(rs.byWeek[w]?.Critical||0)+(rs.byWeek[w]?.Danger||0),0);const rT=recent.reduce((s,w)=>s+(rs.byWeek[w]?.total||0),0);recentPct=rT>0?(rCD/rT*100):0;}if(earlier.length){const eCD=earlier.reduce((s,w)=>s+(rs.byWeek[w]?.Critical||0)+(rs.byWeek[w]?.Danger||0),0);const eT=earlier.reduce((s,w)=>s+(rs.byWeek[w]?.total||0),0);earlierPct=eT>0?(eCD/eT*100):0;}const trending=recentPct>earlierPct+5?'worsening':(recentPct<earlierPct-5?'improving':'stable');const topReasons=Object.entries(rs.reasons).sort((a,b)=>b[1]-a[1]).slice(0,3);let html='<h4>'+(trending==='worsening'?'&#128201;':trending==='improving'?'&#128200;':'&#10145;&#65039;')+' '+rep+' &mdash; Week '+week+' Deep Dive</h4><ul>';html+='<li>This week: <span class="highlight">'+weekPct.toFixed(1)+'% C+D</span> ('+weekCD+'/'+weekStats.total+' pauses) ';html+=vsTeam>5?'&mdash; <span class="negative">'+vsTeam.toFixed(1)+'pp above team avg ('+teamPct.toFixed(1)+'%)</span>':vsTeam<-5?'&mdash; <span class="positive">'+Math.abs(vsTeam).toFixed(1)+'pp below team avg ('+teamPct.toFixed(1)+'%)</span>':'&mdash; <span class="neutral">in line with team avg ('+teamPct.toFixed(1)+'%)</span>';html+='</li>';html+='<li>YTD performance: <span class="highlight">'+ytdPct.toFixed(1)+'% C+D</span> ('+ytdCD+'/'+rs.total+' pauses)</li>';html+='<li>Trend: <span class="'+(trending==='worsening'?'negative':trending==='improving'?'positive':'neutral')+'">'+trending.charAt(0).toUpperCase()+trending.slice(1)+'</span> &mdash; Recent 3-week avg '+recentPct.toFixed(1)+'% vs earlier '+earlierPct.toFixed(1)+'%</li>';if(topReasons.length)html+='<li>Top pause reasons: '+topReasons.map(function(r){return'<strong>'+r[0]+'</strong> ('+r[1]+')';}).join(', ')+'</li>';if(trending==='worsening'&&weekPct>60)html+='<li class="negative"><strong>&#9888; Action required:</strong> '+rep+'\'s C+D rate has been climbing and is now at '+weekPct.toFixed(0)+'%. Review recent calls for quality issues.</li>';else if(trending==='improving')html+='<li class="positive"><strong>&#10003; Positive momentum:</strong> '+rep+' is showing consistent improvement.</li>';html+='</ul>';return html;}
function renderTeamOverview(){const container=document.getElementById('team-overview');const total=DATA.pauses.length;const totalC=DATA.pauses.filter(p=>p.category==='Critical').length;const totalD=DATA.pauses.filter(p=>p.category==='Danger').length;const totalLR=DATA.pauses.filter(p=>p.category==='Likely Reminder').length;const totalNR=DATA.pauses.filter(p=>p.category==='Needs Reviewing').length;const cdPctVal=pct(totalC+totalD,total);const latestW=DATA.weeks[DATA.weeks.length-1];const prevW=DATA.weeks.length>1?DATA.weeks[DATA.weeks.length-2]:null;const latestWS=DATA.weeklyStats[latestW]||{};const prevWS=prevW?DATA.weeklyStats[prevW]:null;const latestCDPct=latestWS.cdPct||0;const prevCDPct=prevWS?prevWS.cdPct:latestCDPct;const trendDiff=(latestCDPct-prevCDPct).toFixed(1);const trendDir=trendDiff>2?'up':trendDiff<-2?'down':'flat';const trendIcon=trendDir==='up'?'&#9650;':trendDir==='down'?'&#9660;':'&#8776;';const alertClass=latestCDPct>=70?'alert-danger':latestCDPct>=50?'alert-warning':'alert-success';const alertMsg=latestCDPct>=70?'Critical alert: '+latestCDPct.toFixed(1)+'% of Week '+latestW+' pauses are Critical or Danger':latestCDPct>=50?'Elevated risk: '+latestCDPct.toFixed(1)+'% C+D rate in Week '+latestW:'Team performing within acceptable range: '+latestCDPct.toFixed(1)+'% C+D in Week '+latestW;container.innerHTML='<div class="alert '+alertClass+'"><span class="alert-icon">'+(latestCDPct>=50?'&#9888;&#65039;':'&#9989;')+'</span><div><strong>'+alertMsg+'</strong> <span style="font-size:0.85rem">('+(latestWS.total||0)+' pauses: '+(latestWS.Critical||0)+'C / '+(latestWS.Danger||0)+'D / '+(latestWS['Likely Reminder']||0)+'LR / '+(latestWS['Needs Reviewing']||0)+'NR)</span></div></div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-value">'+total+'</div><div class="kpi-label">Total Pauses YTD</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-critical)">'+totalC+'</div><div class="kpi-label">Critical (&le;0 B1P)</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-danger)">'+totalD+'</div><div class="kpi-label">Danger (1-4 B1P)</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-likely)">'+totalLR+'</div><div class="kpi-label">Likely Reminder (5 B1P)</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-reviewing)">'+totalNR+'</div><div class="kpi-label">Needs Reviewing (6+ B1P)</div></div><div class="kpi-card"><div class="kpi-value">'+cdPctVal+'%</div><div class="kpi-label">Critical + Danger Rate</div><div class="kpi-trend '+trendDir+'">'+trendIcon+' '+Math.abs(trendDiff)+'pp vs W'+(prevW||'?')+'</div></div></div><div class="commentary">'+generateTeamCommentary()+'</div><div class="card"><h3>&#128202; Risk Classification Scale</h3><div class="risk-scale"><div class="risk-band acceptable">Acceptable<small>&lt;'+CONFIG.THRESHOLDS.MONITOR+'% C+D</small></div><div class="risk-band monitor">Monitor<small>'+CONFIG.THRESHOLDS.MONITOR+'-'+(CONFIG.THRESHOLDS.HIGH_RISK-1)+'% C+D</small></div><div class="risk-band high">High Risk<small>&ge;'+CONFIG.THRESHOLDS.HIGH_RISK+'% C+D</small></div></div><p style="font-size:0.8rem;color:var(--mr-text-muted);margin-top:0.5rem;text-align:center">Classification based on Critical + Danger pause rate. Danger = paused within 4 days of Box 1. Critical = paused before Box 1 arrived.</p></div><div class="grid-2"><div class="card"><h3>&#128202; Weekly Pause Volume by Category</h3><div class="chart-container"><canvas id="weeklyVolumeChart"></canvas></div><div class="commentary" id="volume-commentary"></div></div><div class="card"><h3>&#128200; Weekly B1P Category Mix (%)</h3><div class="chart-container"><canvas id="weeklyStackedChart"></canvas></div><div class="commentary" id="mix-commentary"></div></div></div><div class="card"><h3>&#128101; Sales Rep Comparison &mdash; C+D Rate (YTD)</h3><div class="chart-container tall"><canvas id="repComparisonChart"></canvas></div><div class="commentary" id="rep-comparison-commentary"></div></div><div class="card"><h3>&#127991;&#65039; Rep Status Overview</h3><div class="risk-scale" style="margin-bottom:1rem"><div class="risk-band acceptable">Acceptable<small>&lt;'+CONFIG.THRESHOLDS.MONITOR+'%</small></div><div class="risk-band monitor">Monitor<small>'+CONFIG.THRESHOLDS.MONITOR+'-'+(CONFIG.THRESHOLDS.HIGH_RISK-1)+'%</small></div><div class="risk-band high">High Risk<small>&ge;'+CONFIG.THRESHOLDS.HIGH_RISK+'%</small></div></div><div class="rep-grid" id="team-rep-grid"></div></div>';renderWeeklyVolumeChart();renderWeeklyStackedChart();renderRepComparisonChart();renderTeamRepGrid();}
function renderWeeklyVolumeChart(){destroyChart('weeklyVolume');const ctx=document.getElementById('weeklyVolumeChart').getContext('2d');chartInstances['weeklyVolume']=new Chart(ctx,{type:'bar',data:{labels:DATA.weeks.map(w=>'W'+w),datasets:[{label:'Critical',data:DATA.weeks.map(w=>DATA.weeklyStats[w].Critical),backgroundColor:CONFIG.B1P_CATS.CRITICAL.color},{label:'Danger',data:DATA.weeks.map(w=>DATA.weeklyStats[w].Danger),backgroundColor:CONFIG.B1P_CATS.DANGER.color},{label:'Likely Reminder',data:DATA.weeks.map(w=>DATA.weeklyStats[w]['Likely Reminder']),backgroundColor:CONFIG.B1P_CATS.LIKELY.color},{label:'Needs Reviewing',data:DATA.weeks.map(w=>DATA.weeklyStats[w]['Needs Reviewing']),backgroundColor:CONFIG.B1P_CATS.REVIEWING.color}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,title:{display:true,text:'Pause Count'}}},plugins:{legend:{position:'bottom',labels:{font:{family:'Bricolage Grotesque',weight:'600'},padding:16}},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>=3;},color:'#fff',font:{size:11,weight:'700'}}}}});const vols=DATA.weeks.map(w=>DATA.weeklyStats[w].total);const trend=vols.length>=3?(vols[vols.length-1]>vols[vols.length-2]&&vols[vols.length-2]>vols[vols.length-3]?'rising':vols[vols.length-1]<vols[vols.length-2]&&vols[vols.length-2]<vols[vols.length-3]?'falling':'mixed'):'insufficient';const el=document.getElementById('volume-commentary');if(el)el.innerHTML='<h4>Volume Trend</h4><p>Weekly pause volumes have been <strong>'+trend+'</strong> over the last 3 weeks ('+vols.slice(-3).join(' &rarr; ')+'). Peak volume: W'+DATA.weeks[vols.indexOf(Math.max(...vols))]+' with '+Math.max(...vols)+' pauses.</p>';}
function renderWeeklyStackedChart(){destroyChart('weeklyStacked');const ctx=document.getElementById('weeklyStackedChart').getContext('2d');chartInstances['weeklyStacked']=new Chart(ctx,{type:'bar',data:{labels:DATA.weeks.map(w=>'W'+w),datasets:[{label:'Critical',data:DATA.weeks.map(w=>{const s=DATA.weeklyStats[w];return s.total>0?(s.Critical/s.total*100):0;}),backgroundColor:CONFIG.B1P_CATS.CRITICAL.color},{label:'Danger',data:DATA.weeks.map(w=>{const s=DATA.weeklyStats[w];return s.total>0?(s.Danger/s.total*100):0;}),backgroundColor:CONFIG.B1P_CATS.DANGER.color},{label:'Likely Reminder',data:DATA.weeks.map(w=>{const s=DATA.weeklyStats[w];return s.total>0?(s['Likely Reminder']/s.total*100):0;}),backgroundColor:CONFIG.B1P_CATS.LIKELY.color},{label:'Needs Reviewing',data:DATA.weeks.map(w=>{const s=DATA.weeklyStats[w];return s.total>0?(s['Needs Reviewing']/s.total*100):0;}),backgroundColor:CONFIG.B1P_CATS.REVIEWING.color}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';}},title:{display:true,text:'% of Weekly Pauses'}}},plugins:{legend:{position:'bottom',labels:{font:{family:'Bricolage Grotesque',weight:'600'},padding:16}},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.raw.toFixed(1)+'%';}}},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>=5;},formatter:function(v){return v>=5?Math.round(v)+'%':'';},color:'#fff',font:{size:11,weight:'700'}}}}});const el=document.getElementById('mix-commentary');if(el){const latest=DATA.weeklyStats[DATA.weeks[DATA.weeks.length-1]];const nrPct=latest.total>0?(latest['Needs Reviewing']/latest.total*100):0;el.innerHTML='<h4>Category Mix Insight</h4><p>A healthy team should see the green "Needs Reviewing" segment growing over time. Currently at <strong>'+nrPct.toFixed(1)+'%</strong> in the latest week. '+(nrPct>30?'<span class="positive">Encouraging &mdash; a good proportion of pauses are later-stage.</span>':'<span class="negative">Concerning &mdash; most pauses are still early-stage (Critical or Danger).</span>')+'</p>';}}
function renderRepComparisonChart(){destroyChart('repComparison');const ctx=document.getElementById('repComparisonChart').getContext('2d');const repData=DATA.reps.map(function(rep){const rs=DATA.repStats[rep];const cdPct=rs.total>0?((rs.Critical+rs.Danger)/rs.total*100):0;return{rep:rep,pct:cdPct,total:rs.total};}).sort((a,b)=>b.pct-a.pct);chartInstances['repComparison']=new Chart(ctx,{type:'bar',data:{labels:repData.map(d=>d.rep+' (n='+d.total+')'),datasets:[{label:'Critical + Danger %',data:repData.map(d=>d.pct),backgroundColor:repData.map(d=>d.pct>=CONFIG.THRESHOLDS.HIGH_RISK?CONFIG.B1P_CATS.CRITICAL.color:d.pct>=CONFIG.THRESHOLDS.MONITOR?CONFIG.B1P_CATS.LIKELY.color:CONFIG.B1P_CATS.REVIEWING.color),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:{beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';}},title:{display:true,text:'Critical + Danger Rate (%)'}},y:{ticks:{font:{weight:'600'}}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.raw.toFixed(1)+'% C+D (n='+repData[ctx.dataIndex].total+')';}}},datalabels:{anchor:'end',align:'right',color:'#451219',font:{size:12,weight:'700'},formatter:function(v){return v.toFixed(1)+'%';}}}}});const el=document.getElementById('rep-comparison-commentary');if(el){const highRisk=repData.filter(d=>d.pct>=CONFIG.THRESHOLDS.HIGH_RISK);const monitors=repData.filter(d=>d.pct>=CONFIG.THRESHOLDS.MONITOR&&d.pct<CONFIG.THRESHOLDS.HIGH_RISK);const acceptable=repData.filter(d=>d.pct<CONFIG.THRESHOLDS.MONITOR);const teamAvg=repData.reduce((s,d)=>s+d.pct,0)/repData.length;let html='<h4>Rep Performance Summary</h4><ul>';html+='<li>Team average C+D rate: <strong>'+teamAvg.toFixed(1)+'%</strong></li>';if(highRisk.length)html+='<li><span class="negative">High Risk ('+highRisk.length+'):</span> '+highRisk.map(d=>d.rep+' ('+d.pct.toFixed(0)+'%)').join(', ')+' &mdash; &ge;50% of pauses in Critical or Danger</li>';if(monitors.length)html+='<li><span class="neutral">Monitor ('+monitors.length+'):</span> '+monitors.map(d=>d.rep+' ('+d.pct.toFixed(0)+'%)').join(', ')+' &mdash; elevated rates requiring attention</li>';if(acceptable.length)html+='<li><span class="positive">Acceptable ('+acceptable.length+'):</span> '+acceptable.map(d=>d.rep+' ('+d.pct.toFixed(0)+'%)').join(', ')+'</li>';html+='</ul>';el.innerHTML=html;}}
function renderTeamRepGrid(){const container=document.getElementById('team-rep-grid');const repData=DATA.reps.map(function(rep){const rs=DATA.repStats[rep];const cdPct=rs.total>0?((rs.Critical+rs.Danger)/rs.total*100):0;return{rep:rep,pct:cdPct,total:rs.total,status:getRepStatus(cdPct)};}).sort((a,b)=>b.pct-a.pct);container.innerHTML=repData.map(d=>'<div class="rep-btn"><span style="font-weight:700">'+d.rep+'</span><span class="tag tag-'+d.status+'">'+getStatusLabel(d.status)+'</span><span style="font-size:0.8rem">'+d.total+' pauses</span><span style="font-size:0.75rem;color:'+(d.pct>=50?'var(--mr-error)':'var(--mr-text-muted)')+'">'+d.pct.toFixed(1)+'% C+D</span></div>').join('');}
function renderWeekBreakdown(){const container=document.getElementById('week-breakdown');container.innerHTML='<div id="week-selector-view"><h2 style="margin-bottom:1rem">Select a Week</h2><div class="week-grid" id="week-grid"></div></div><div id="rep-selector-view" style="display:none"><button class="back-btn" onclick="showWeekSelector()">&#8592; Back to Weeks</button><h2 style="margin-bottom:0.5rem">Week <span id="selected-week-num"></span></h2><p style="color:var(--mr-text-muted);margin-bottom:1rem" id="selected-week-dates"></p><div class="kpi-grid" id="week-kpis"></div><div class="commentary" id="week-commentary"></div><h3 style="margin:1.5rem 0 1rem">Select a Sales Rep</h3><div class="rep-grid" id="week-rep-grid"></div></div><div id="rep-detail-view" style="display:none"><button class="back-btn" id="back-to-week-btn">&#8592; Back to Week</button><div id="rep-detail-content"></div></div>';renderWeekGrid();}
function renderWeekGrid(){document.getElementById('week-grid').innerHTML=DATA.weeks.map(function(week){const ws=DATA.weeklyStats[week];return'<button class="week-btn" onclick="selectWeek('+week+')"><span style="font-weight:700;font-size:1.1rem">Week '+week+'</span><span class="week-dates">'+getWeekDates(week)+'</span><span style="font-size:0.8rem;margin-top:0.25rem">'+ws.total+' pauses</span><span style="font-size:0.75rem;color:'+(ws.cdPct>=50?'var(--cat-critical)':'var(--mr-text-muted)')+'">'+ws.cdPct.toFixed(0)+'% C+D</span></button>';}).join('');}
function selectWeek(week){selectedWeek=week;document.getElementById('week-selector-view').style.display='none';document.getElementById('rep-selector-view').style.display='block';document.getElementById('rep-detail-view').style.display='none';document.getElementById('selected-week-num').textContent=week;document.getElementById('selected-week-dates').textContent=getWeekDates(week);renderWeekKPIs(week);renderWeekRepGrid(week);const ws=DATA.weeklyStats[week];const prevIdx=DATA.weeks.indexOf(week)-1;const prevWS=prevIdx>=0?DATA.weeklyStats[DATA.weeks[prevIdx]]:null;const el=document.getElementById('week-commentary');if(el){let html='<h4>Week '+week+' Summary</h4><ul>';html+='<li><strong>'+ws.total+'</strong> total pauses: '+ws.Critical+' Critical, '+ws.Danger+' Danger, '+ws['Likely Reminder']+' Likely Reminder, '+ws['Needs Reviewing']+' Needs Reviewing</li>';html+='<li>C+D rate: <strong>'+ws.cdPct.toFixed(1)+'%</strong>';if(prevWS){const diff=ws.cdPct-prevWS.cdPct;html+=' ('+(diff>0?'+':'')+diff.toFixed(1)+'pp vs W'+DATA.weeks[prevIdx]+')';}html+='</li>';html+='<li>'+Object.entries(ws.byRep).length+' reps active this week</li></ul>';el.innerHTML=html;}}
function renderWeekKPIs(week){const ws=DATA.weeklyStats[week];const cdPct=ws.cdPct;const prevIdx=DATA.weeks.indexOf(week)-1;const prevWS=prevIdx>=0?DATA.weeklyStats[DATA.weeks[prevIdx]]:null;const diff=prevWS?(cdPct-prevWS.cdPct).toFixed(1):null;document.getElementById('week-kpis').innerHTML='<div class="kpi-card"><div class="kpi-value">'+ws.total+'</div><div class="kpi-label">Total Pauses</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-critical)">'+ws.Critical+'</div><div class="kpi-label">Critical</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-danger)">'+ws.Danger+'</div><div class="kpi-label">Danger</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-likely)">'+ws['Likely Reminder']+'</div><div class="kpi-label">Likely Reminder</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-reviewing)">'+ws['Needs Reviewing']+'</div><div class="kpi-label">Needs Reviewing</div></div><div class="kpi-card"><div class="kpi-value">'+cdPct.toFixed(1)+'%</div><div class="kpi-label">C+D Rate</div>'+(diff!==null?'<div class="kpi-trend '+(diff>2?'up':diff<-2?'down':'flat')+'">'+(diff>0?'+':'')+diff+'pp vs prev</div>':'')+'</div>';}
function renderWeekRepGrid(week){const ws=DATA.weeklyStats[week];const reps=Object.entries(ws.byRep).map(function(e){const rep=e[0],s=e[1];const cdPct=s.total>0?((s.Critical+s.Danger)/s.total*100):0;return{rep:rep,stats:s,pct:cdPct,status:getRepStatus(cdPct)};}).sort((a,b)=>b.pct-a.pct);document.getElementById('week-rep-grid').innerHTML=reps.map(d=>'<button class="rep-btn" onclick="selectRep(\''+d.rep+'\');"><span style="font-weight:700">'+d.rep+'</span><span class="tag tag-'+d.status+'">'+getStatusLabel(d.status)+'</span><span style="font-size:0.8rem">'+d.stats.total+' pauses</span><span style="font-size:0.75rem;color:'+(d.pct>=50?'var(--mr-error)':'var(--mr-text-muted)')+'">'+d.pct.toFixed(0)+'% C+D</span></button>').join('');}
function showWeekSelector(){document.getElementById('week-selector-view').style.display='block';document.getElementById('rep-selector-view').style.display='none';document.getElementById('rep-detail-view').style.display='none';}
function showRepSelector(){document.getElementById('week-selector-view').style.display='none';document.getElementById('rep-selector-view').style.display='block';document.getElementById('rep-detail-view').style.display='none';}
function selectRep(rep){selectedRep=rep;document.getElementById('week-selector-view').style.display='none';document.getElementById('rep-selector-view').style.display='none';document.getElementById('rep-detail-view').style.display='block';document.getElementById('back-to-week-btn').textContent='\u2190 Back to Week '+selectedWeek;document.getElementById('back-to-week-btn').onclick=showRepSelector;renderRepDetail(rep,selectedWeek);}
function renderRepDetail(rep,week){const container=document.getElementById('rep-detail-content');const rs=DATA.repStats[rep];const weekStats=DATA.weeklyStats[week]?.byRep[rep]||{total:0,Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};const weekCD=weekStats.Critical+weekStats.Danger;const weekPct=weekStats.total>0?(weekCD/weekStats.total*100):0;const weekStatus=getRepStatus(weekPct);const teamPct=DATA.weeklyStats[week]?DATA.weeklyStats[week].cdPct:0;const repWeeks=Object.keys(rs.byWeek).map(Number).sort((a,b)=>a-b);const recent=repWeeks.slice(-3);const earlier=repWeeks.slice(0,Math.max(1,repWeeks.length-3));let recentPct=0,earlierPct=0;if(recent.length){const rCD=recent.reduce((s,w)=>s+(rs.byWeek[w]?.Critical||0)+(rs.byWeek[w]?.Danger||0),0);const rT=recent.reduce((s,w)=>s+(rs.byWeek[w]?.total||0),0);recentPct=rT>0?(rCD/rT*100):0;}if(earlier.length){const eCD=earlier.reduce((s,w)=>s+(rs.byWeek[w]?.Critical||0)+(rs.byWeek[w]?.Danger||0),0);const eT=earlier.reduce((s,w)=>s+(rs.byWeek[w]?.total||0),0);earlierPct=eT>0?(eCD/eT*100):0;}const trending=recentPct>earlierPct+5?'worsening':(recentPct<earlierPct-5?'improving':'stable');const weekPauses=DATA.pauses.filter(p=>p.rep===rep&&p.week===week);const criticalPauses=weekPauses.filter(p=>p.category==='Critical');const dangerPauses=weekPauses.filter(p=>p.category==='Danger');const likelyPauses=weekPauses.filter(p=>p.category==='Likely Reminder');const reviewingPauses=weekPauses.filter(p=>p.category==='Needs Reviewing');const ytdCD=rs.Critical+rs.Danger;const ytdPct=rs.total>0?(ytdCD/rs.total*100):0;container.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.75rem"><div><h2 style="margin-bottom:0.25rem">'+rep+'</h2><p style="color:var(--mr-text-muted)">Week '+week+' &middot; '+getWeekDates(week)+'</p></div><div style="display:flex;gap:0.5rem;align-items:center"><span class="tag tag-'+weekStatus+'" style="font-size:0.9rem;padding:0.5rem 1rem">'+getStatusLabel(weekStatus)+'</span><span class="trend-badge '+trending+'">'+(trending==='worsening'?'&#9650; Worsening':trending==='improving'?'&#9660; Improving':'&#8594; Stable')+'</span></div></div><div class="commentary">'+generateRepCommentary(rep,week)+'</div><div class="kpi-grid"><div class="kpi-card"><div class="kpi-value">'+weekStats.total+'</div><div class="kpi-label">Pauses This Week</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-critical)">'+weekStats.Critical+'</div><div class="kpi-label">Critical</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-danger)">'+weekStats.Danger+'</div><div class="kpi-label">Danger</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-likely)">'+weekStats['Likely Reminder']+'</div><div class="kpi-label">Likely Reminder</div></div><div class="kpi-card"><div class="kpi-value" style="color:var(--cat-reviewing)">'+weekStats['Needs Reviewing']+'</div><div class="kpi-label">Needs Reviewing</div></div><div class="kpi-card"><div class="kpi-value">'+weekPct.toFixed(1)+'%</div><div class="kpi-label">C+D Rate</div><div class="kpi-trend '+(weekPct>teamPct+5?'up':weekPct<teamPct-5?'down':'flat')+'">Team avg: '+teamPct.toFixed(1)+'%</div></div></div><div class="card"><h3>&#128202; '+rep+' vs Team &mdash; C+D Rate by Week</h3><div class="chart-container"><canvas id="rep-vs-team-chart"></canvas></div><div class="commentary"><h4>Trend vs Team</h4><p>'+rep+'\'s C+D rate is currently <strong>'+(weekPct>teamPct+5?'<span class="negative">above':weekPct<teamPct-5?'<span class="positive">below':'<span class="neutral">in line with')+'</span> the team average</strong>. YTD: '+ytdPct.toFixed(1)+'% C+D ('+ytdCD+'/'+rs.total+' pauses). Recent trend: <strong>'+trending+'</strong> ('+recentPct.toFixed(1)+'% recent vs '+earlierPct.toFixed(1)+'% earlier).</p></div></div><div class="card"><h3>&#128203; Week '+week+' Pauses by Category</h3><p style="font-size:0.85rem;color:var(--mr-text-muted);margin-bottom:1rem">Click each section to expand/collapse. All dates shown as DD/MM/YY.</p>'+renderCategoryAccordion('Critical',criticalPauses,'acc-critical',true)+renderCategoryAccordion('Danger',dangerPauses,'acc-danger',true)+renderCategoryAccordion('Likely Reminder',likelyPauses,'acc-likely',false)+renderCategoryAccordion('Needs Reviewing',reviewingPauses,'acc-reviewing',false)+'</div><div class="grid-2"><div class="card"><h3>&#128200; '+rep+'\'s Weekly B1P Breakdown</h3><div class="chart-container"><canvas id="rep-weekly-breakdown-chart"></canvas></div></div><div class="card"><h3>&#127991;&#65039; Pause Reasons (YTD)</h3><div class="chart-container"><canvas id="rep-reasons-chart"></canvas></div></div></div><div class="commentary"><h4>YTD Performance Summary</h4><ul><li>Total pauses: <strong>'+rs.total+'</strong></li><li>Critical: '+rs.Critical+' ('+pct(rs.Critical,rs.total)+'%) | Danger: '+rs.Danger+' ('+pct(rs.Danger,rs.total)+'%)</li><li>Likely Reminder: '+rs['Likely Reminder']+' ('+pct(rs['Likely Reminder'],rs.total)+'%) | Needs Reviewing: '+rs['Needs Reviewing']+' ('+pct(rs['Needs Reviewing'],rs.total)+'%)</li><li>Active weeks: '+repWeeks.length+' (W'+repWeeks[0]+' &ndash; W'+repWeeks[repWeeks.length-1]+')</li></ul>'+(trending==='worsening'?'<p style="margin-top:0.5rem"><span class="negative"><strong>&#9888; Attention needed:</strong> Performance has been declining. Review recent call quality.</span></p>':'')+(trending==='improving'?'<p style="margin-top:0.5rem"><span class="positive"><strong>&#10003; Good progress:</strong> Performance improving. Keep up current coaching.</span></p>':'')+'</div>';renderRepVsTeamChart(rep);renderRepWeeklyBreakdownChart(rep);renderRepReasonsChart(rep);document.querySelectorAll('.accordion-header').forEach(function(header){header.addEventListener('click',function(){header.parentElement.classList.toggle('open');});});}
function renderCategoryAccordion(category,pauses,cssClass,openByDefault){const tagClass=category==='Critical'?'tag-critical':category==='Danger'?'tag-danger':category==='Likely Reminder'?'tag-likely':'tag-reviewing';return'<div class="accordion '+cssClass+(openByDefault&&pauses.length>0?' open':'')+'"><div class="accordion-header"><span><span class="tag '+tagClass+'" style="margin-right:0.5rem">'+category+'</span> '+category+' Pauses ('+pauses.length+')</span><span class="chevron">&#9660;</span></div><div class="accordion-body">'+(pauses.length>0?'<div class="table-wrapper"><table><thead><tr><th>Customer</th><th>Phone</th><th>Pause Date</th><th>B1P</th><th>Reason</th><th>Sub-Reason</th><th>Recording</th><th>AI Diagnostics</th></tr></thead><tbody>'+pauses.map(function(p){return'<tr><td>'+(p.customer||'-')+'</td><td>'+(p.phone||'-')+'</td><td>'+formatDateDDMMYY(p.pauseDate)+'</td><td class="'+getB1PClass(p.category)+'">'+p.b1p+'</td><td>'+(p.mainReason||'-')+'</td><td>'+(p.subReason||'-')+'</td><td><span class="ai-pending">Awaiting AI</span></td><td><span class="ai-pending">Awaiting AI</span></td></tr>';}).join('')+'</tbody></table></div>':'<p style="padding:1rem;color:var(--mr-text-muted);text-align:center">No '+category+' pauses this week &#127881;</p>')+'</div></div>';}
function renderRepVsTeamChart(rep){destroyChart('repVsTeam');const ctx=document.getElementById('rep-vs-team-chart');if(!ctx)return;const rs=DATA.repStats[rep];chartInstances['repVsTeam']=new Chart(ctx,{type:'line',data:{labels:DATA.weeks.map(w=>'W'+w),datasets:[{label:rep,data:DATA.weeks.map(w=>{const ws=rs.byWeek[w];return ws?(ws.total>0?((ws.Critical+ws.Danger)/ws.total*100):null):null;}),borderColor:CONFIG.B1P_CATS.CRITICAL.color,backgroundColor:'rgba(150,6,28,0.1)',fill:false,tension:0.3,borderWidth:3,pointRadius:5,pointBackgroundColor:CONFIG.B1P_CATS.CRITICAL.color,spanGaps:false},{label:'Team Average',data:DATA.weeks.map(w=>DATA.weeklyStats[w].cdPct),borderColor:'#816165',backgroundColor:'rgba(129,97,101,0.08)',fill:false,tension:0.3,borderWidth:2,borderDash:[6,4],pointRadius:4,pointBackgroundColor:'#816165'}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';}},title:{display:true,text:'C+D Rate (%)'}}},plugins:{legend:{position:'bottom',labels:{font:{family:'Bricolage Grotesque',weight:'600'},padding:16}},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]!==null;},anchor:'end',align:'top',offset:4,color:function(ctx){return ctx.datasetIndex===0?'#96061C':'#816165';},font:{size:11,weight:'700'},formatter:function(v){return v!==null?Math.round(v)+'%':'';}}}}});}
function renderRepWeeklyBreakdownChart(rep){destroyChart('repWeeklyBreakdown');const ctx=document.getElementById('rep-weekly-breakdown-chart');if(!ctx)return;const rs=DATA.repStats[rep];const repWeeks=Object.keys(rs.byWeek).map(Number).sort((a,b)=>a-b);chartInstances['repWeeklyBreakdown']=new Chart(ctx,{type:'bar',data:{labels:repWeeks.map(w=>'W'+w),datasets:[{label:'Critical',data:repWeeks.map(w=>rs.byWeek[w].Critical),backgroundColor:CONFIG.B1P_CATS.CRITICAL.color},{label:'Danger',data:repWeeks.map(w=>rs.byWeek[w].Danger),backgroundColor:CONFIG.B1P_CATS.DANGER.color},{label:'Likely Reminder',data:repWeeks.map(w=>rs.byWeek[w]['Likely Reminder']),backgroundColor:CONFIG.B1P_CATS.LIKELY.color},{label:'Needs Reviewing',data:repWeeks.map(w=>rs.byWeek[w]['Needs Reviewing']),backgroundColor:CONFIG.B1P_CATS.REVIEWING.color}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,title:{display:true,text:'Pause Count'}}},plugins:{legend:{position:'bottom',labels:{font:{family:'Bricolage Grotesque',weight:'600'},padding:12}},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>=2;},color:'#fff',font:{size:10,weight:'700'}}}}});}
function renderRepReasonsChart(rep){destroyChart('repReasons');const ctx=document.getElementById('rep-reasons-chart');if(!ctx)return;const rs=DATA.repStats[rep];const reasons=Object.entries(rs.reasons).sort((a,b)=>b[1]-a[1]).slice(0,6);chartInstances['repReasons']=new Chart(ctx,{type:'doughnut',data:{labels:reasons.map(function(r){return r[0].length>22?r[0].substring(0,22)+'...':r[0];}),datasets:[{data:reasons.map(r=>r[1]),backgroundColor:['#96061C','#E92A00','#D69042','#E9B377','#816165','#451219']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'Bricolage Grotesque',size:11},padding:10}},datalabels:{color:'#fff',font:{size:12,weight:'700'},formatter:function(val,ctx){const total=ctx.dataset.data.reduce((a,b)=>a+b,0);return val+' ('+Math.round(val/total*100)+'%)';}}}}});}
function renderPauseAnalysis(){const container=document.getElementById('pause-analysis');const reasonCounts={};const subReasonCounts={};const b1pByReason={};DATA.pauses.forEach(function(p){if(p.mainReason){reasonCounts[p.mainReason]=(reasonCounts[p.mainReason]||0)+1;if(!b1pByReason[p.mainReason])b1pByReason[p.mainReason]={Critical:0,Danger:0,'Likely Reminder':0,'Needs Reviewing':0};b1pByReason[p.mainReason][p.category]++;}if(p.subReason)subReasonCounts[p.subReason]=(subReasonCounts[p.subReason]||0)+1;});const topReasons=Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1]);const topSubReasons=Object.entries(subReasonCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);const topReason=topReasons[0]?topReasons[0][0]:'-';const topReasonPct=topReasons[0]?pct(topReasons[0][1],DATA.pauses.length):'0';container.innerHTML='<div class="kpi-grid"><div class="kpi-card"><div class="kpi-value">'+topReasons.length+'</div><div class="kpi-label">Unique Reasons</div></div><div class="kpi-card"><div class="kpi-value" style="font-size:1.4rem">'+topReason+'</div><div class="kpi-label">Top Reason ('+topReasonPct+'%)</div></div><div class="kpi-card"><div class="kpi-value">'+Object.keys(subReasonCounts).length+'</div><div class="kpi-label">Unique Sub-Reasons</div></div></div><div class="commentary"><h4>Pause Reason Analysis</h4><ul>'+topReasons.slice(0,4).map(function(r){return'<li><strong>'+r[0]+'</strong>: '+r[1]+' pauses ('+pct(r[1],DATA.pauses.length)+'%) &mdash; B1P mix: '+b1pByReason[r[0]].Critical+'C / '+b1pByReason[r[0]].Danger+'D / '+b1pByReason[r[0]]['Likely Reminder']+'LR / '+b1pByReason[r[0]]['Needs Reviewing']+'NR</li>';}).join('')+'</ul><p style="margin-top:0.5rem">Reasons with high Critical+Danger proportions suggest issues occurring before the customer has experienced the product.</p></div><div class="card"><h3>&#128202; Pause Reasons by B1P Category</h3><div class="chart-container tall"><canvas id="reasons-b1p-chart"></canvas></div></div><div class="grid-2"><div class="card"><h3>&#127991;&#65039; Main Pause Reasons</h3><div class="table-wrapper"><table><thead><tr><th>Reason</th><th>Count</th><th>%</th><th>C+D %</th></tr></thead><tbody>'+topReasons.map(function(r){const br=b1pByReason[r[0]]||{};const cd=(br.Critical||0)+(br.Danger||0);return'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+pct(r[1],DATA.pauses.length)+'%</td><td style="color:'+(cd/r[1]*100>60?'var(--mr-error)':'inherit')+'">'+pct(cd,r[1])+'%</td></tr>';}).join('')+'</tbody></table></div></div><div class="card"><h3>&#127991;&#65039; Top Sub-Reasons</h3><div class="table-wrapper"><table><thead><tr><th>Sub-Reason</th><th>Count</th><th>%</th></tr></thead><tbody>'+topSubReasons.map(function(r){return'<tr><td>'+(r[0].length>40?r[0].substring(0,40)+'...':r[0])+'</td><td>'+r[1]+'</td><td>'+pct(r[1],DATA.pauses.length)+'%</td></tr>';}).join('')+'</tbody></table></div></div></div><div class="card"><h3>&#128200; Reason Trends by Week</h3><div class="filter-pills" id="reason-trend-filters"></div><div class="chart-container tall"><canvas id="reason-trend-chart"></canvas></div></div>';renderReasonsB1PChart(b1pByReason);renderReasonTrendChart(topReasons);}
function renderReasonsB1PChart(b1pByReason){destroyChart('reasonsB1P');const ctx=document.getElementById('reasons-b1p-chart').getContext('2d');const reasons=Object.entries(b1pByReason).sort(function(a,b){return(b[1].Critical+b[1].Danger+b[1]['Likely Reminder']+b[1]['Needs Reviewing'])-(a[1].Critical+a[1].Danger+a[1]['Likely Reminder']+a[1]['Needs Reviewing']);}).slice(0,8);chartInstances['reasonsB1P']=new Chart(ctx,{type:'bar',data:{labels:reasons.map(function(r){return r[0].length>20?r[0].substring(0,20)+'...':r[0];}),datasets:[{label:'Critical',data:reasons.map(r=>r[1].Critical),backgroundColor:CONFIG.B1P_CATS.CRITICAL.color},{label:'Danger',data:reasons.map(r=>r[1].Danger),backgroundColor:CONFIG.B1P_CATS.DANGER.color},{label:'Likely Reminder',data:reasons.map(r=>r[1]['Likely Reminder']),backgroundColor:CONFIG.B1P_CATS.LIKELY.color},{label:'Needs Reviewing',data:reasons.map(r=>r[1]['Needs Reviewing']),backgroundColor:CONFIG.B1P_CATS.REVIEWING.color}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true,title:{display:true,text:'Count'}},y:{stacked:true}},plugins:{legend:{position:'bottom',labels:{font:{family:'Bricolage Grotesque',weight:'600'},padding:16}},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>=3;},color:'#fff',font:{size:11,weight:'700'}}}}});}
function renderReasonTrendChart(topReasons){const filtersEl=document.getElementById('reason-trend-filters');const top5=topReasons.slice(0,5);const colors=['#96061C','#E92A00','#D69042','#451219','#816165'];filtersEl.innerHTML=top5.map(function(r,i){return'<button class="filter-pill '+(i===0?'active':'')+'" data-reason="'+r[0]+'">'+r[0]+' ('+r[1]+')</button>';}).join('');function renderChart(selectedReasons){destroyChart('reasonTrend');const ctx=document.getElementById('reason-trend-chart').getContext('2d');const datasets=selectedReasons.map(function(reason,idx){return{label:reason,data:DATA.weeks.map(w=>DATA.pauses.filter(p=>p.week===w&&p.mainReason===reason).length),borderColor:colors[idx%colors.length],backgroundColor:colors[idx%colors.length]+'20',fill:false,tension:0.3,borderWidth:2,pointRadius:4,pointBackgroundColor:colors[idx%colors.length]};});chartInstances['reasonTrend']=new Chart(ctx,{type:'line',data:{labels:DATA.weeks.map(w=>'W'+w),datasets:datasets},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,title:{display:true,text:'Count'}}},plugins:{legend:{position:'bottom',labels:{font:{family:'Bricolage Grotesque',weight:'600'},padding:16}},datalabels:{display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>0;},anchor:'end',align:'top',offset:2,color:function(ctx){return colors[ctx.datasetIndex%colors.length];},font:{size:10,weight:'700'}}}}});}renderChart([top5[0]?top5[0][0]:null].filter(Boolean));filtersEl.querySelectorAll('.filter-pill').forEach(function(pill){pill.addEventListener('click',function(e){e.target.classList.toggle('active');const active=[].slice.call(filtersEl.querySelectorAll('.filter-pill.active')).map(p=>p.dataset.reason);if(active.length===0){e.target.classList.add('active');return;}renderChart(active);});});}
document.querySelectorAll('.nav-tab').forEach(function(tab){tab.addEventListener('click',function(){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));tab.classList.add('active');document.getElementById(tab.dataset.tab).classList.add('active');if(tab.dataset.tab==='week-breakdown')showWeekSelector();});});
fetchData();
</script>
