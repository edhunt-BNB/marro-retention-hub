name: Commit Transcripts Bundle
on:
  push:
    paths: [".github/workflows/commit-transcripts.yml"]
permissions:
  contents: write
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and unpack
        run: |
          curl -sL "https://pub.hyperagent.com/api/published/BZR1y42MqMHTPBERnJjcnw/transcripts_bundle.json" -o bundle.json
          python3 << 'INNEREOF'
          import json, os
          os.makedirs("data/transcripts", exist_ok=True)
          with open("bundle.json") as f:
              bundle = json.load(f)
          for phone, text in bundle.items():
              path = f"data/transcripts/{phone}.txt"
              with open(path, "w") as out:
                  out.write(text)
              print(f"Wrote {path} ({len(text)} chars)")
          print(f"Total: {len(bundle)} files")
          INNEREOF
      - name: Commit
        run: |
          git config user.name "Marro Recording Bot"
          git config user.email "bot@marro.ai"
          git add data/transcripts/
          git diff --staged --quiet || git commit -m "data: add 12 transcripts via Recording Assigner (2026-04-16)"
          git push
      - name: Cleanup
        run: |
          git rm .github/workflows/commit-transcripts.yml
          git commit -m "chore: remove transcript commit workflow"
          git push
