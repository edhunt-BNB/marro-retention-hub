name: deploy-ai-column-links
on:
  push:
    paths: [".github/workflows/deploy-ai-column-links.yml"]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pull latest
        run: git pull --rebase origin main
      - name: Apply AI column rendering fix
        env:
          OLD_B64: ""
          NEW_B64: ""
        run: |
          python3 << 'PYSCRIPT'
          import base64, os, sys
          with open("index.html", "r") as f:
              html = f.read()
          print(f"Read {len(html)} chars")
          old = base64.b64decode(os.environ["OLD_B64"]).decode()
          new = base64.b64decode(os.environ["NEW_B64"]).decode()
          if old in html:
              html = html.replace(old, new)
              with open("index.html", "w") as f:
                  f.write(html)
              print(f"SUCCESS: Applied replacement. Wrote {len(html)} chars")
          elif "Report</a>" in html:
              print("ALREADY DEPLOYED")
              sys.exit(0)
          else:
              print("ERROR: Pattern not found")
              sys.exit(1)
          PYSCRIPT
      - name: Commit and push
        run: |
          git config user.name "Marro Retention Bot"
          git config user.email "bot@marro.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: AI column renders report URLs as clickable links"
            git pull --rebase origin main
            git push
          fi
      - name: Cleanup workflow
        run: |
          git rm .github/workflows/deploy-ai-column-links.yml
          git commit -m "chore: remove one-time deploy workflow"
          git push
