name: deploy-score-column
on:
  push:
    paths: [".github/workflows/deploy-score-column.yml"]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply Score column changes
        run: |
          python3 << 'PYSCRIPT'
          with open("index.html", "r") as f:
              html = f.read()
          print(f"Read {len(html)} chars")

          changes = []

          # 1. Add qaScore to getRecordingData empty returns
          old1 = "return{recording:'',transcript:'',aiAnalysis:''}"
          new1 = "return{recording:'',transcript:'',aiAnalysis:'',qaScore:''}"
          if old1 in html:
              html = html.replace(old1, new1)
              changes.append("Added qaScore to empty returns")

          # 2. Add qaScore to getRecordingData data return
          old2 = "aiAnalysis:entry.ai_analysis||''}"
          new2 = "aiAnalysis:entry.ai_analysis||'',qaScore:entry.qa_score||''}"
          if old2 in html:
              html = html.replace(old2, new2)
              changes.append("Added qaScore to data return")

          # 3. Add qaScore to pause object
          old3 = "aiAnalysis:recData.aiAnalysis}"
          new3 = "aiAnalysis:recData.aiAnalysis,qaScore:recData.qaScore}"
          if old3 in html:
              html = html.replace(old3, new3)
              changes.append("Added qaScore to pause object")

          # 4. Add Score column header
          old4 = "<th>Transcript</th><th>AI</th>"
          new4 = "<th>Transcript</th><th>Score</th><th>AI</th>"
          if old4 in html:
              html = html.replace(old4, new4)
              changes.append("Added Score column header")

          # 5. Add Score cell rendering (color-coded)
          old5 = "Awaiting</span>')+'</td><td>'+(p.aiAnalysis?"
          new5 = """Awaiting</span>')+'</td><td>'+(p.qaScore?'<span style=\"font-weight:700;font-size:.85rem;color:'+(parseFloat(p.qaScore)>=7?'var(--mr-success)':parseFloat(p.qaScore)>=5?'var(--mr-amber-dark)':'var(--mr-error)')+'\">'+p.qaScore+'/10</span>':'<span class=\"ai-pending\">Awaiting</span>')+'</td><td>'+(p.aiAnalysis?"""
          if old5 in html:
              html = html.replace(old5, new5)
              changes.append("Added Score cell (green>=7, amber>=5, red<5)")

          with open("index.html", "w") as f:
              f.write(html)
          print(f"Wrote {len(html)} chars")
          print(f"Applied {len(changes)}/5 changes: {changes}")
          if len(changes) < 5:
              print("WARNING: Some changes did not apply.")
          PYSCRIPT
      - name: Commit changes
        run: |
          git config user.name "Marro Retention Bot"
          git config user.email "bot@marro.ai"
          git add index.html
          git diff --staged --quiet || git commit -m "feat: add Score column with color-coded QA scores"
          git push
      - name: Cleanup workflow
        run: |
          git rm .github/workflows/deploy-score-column.yml
          git commit -m "chore: remove one-time deploy workflow"
          git push
