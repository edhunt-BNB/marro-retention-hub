name: Deploy Recordings Loading Code
on:
  push:
    paths:
      - '.github/workflows/deploy-recordings.yml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Apply recordings.json loading code
        run: |
          python3 << 'PYEOF'
          import base64

          with open('index.html', 'r') as f:
              html = f.read()

          orig_len = len(html)
          changes = []

          # Change 1: Remove RECORDING/TRANSCRIPT/AI from COLS
          old1 = ',RECORDING:37,TRANSCRIPT:38,AI_ANALYSIS:39}'
          if old1 in html:
              html = html.replace(old1, '}')
              changes.append('Removed RECORDING COLS')

          # Change 2: Add RECORDINGS_JSON_URL
          if 'RECORDINGS_JSON_URL' not in html:
              old2 = "APPS_SCRIPT_URL:'https://script.google.com/macros/s/AKfycbyWQAUe1MgCLYVvAuXBHu6ZXmUSc-BlQQjBFOwZwRpNpPaIPtxW0eRK-h99_94uxOfE/exec',"
              html = html.replace(old2, old2 + "RECORDINGS_JSON_URL:'https://raw.githubusercontent.com/edhunt-BNB/marro-retention-hub/main/data/recordings.json',")
              changes.append('Added RECORDINGS_JSON_URL')

          # Change 3: Add fetchRecordings + getRecordingData (base64-encoded to avoid escaping)
          if 'fetchRecordings' not in html:
              js_b64 = ''
              js_code = base64.b64decode(js_b64).decode()
              data_decl = 'let DATA={raw:[],pauses:[],weeklyStats:{},repStats:{},weeks:[],reps:[],teamAvg:{}};'
              html = html.replace(data_decl, data_decl + js_code)
              changes.append('Added fetchRecordings/getRecordingData')

          # Change 4: Add fetchRecordings() call to fetchData
          if 'await fetchRecordings()' not in html and 'fetchRecordings' in html:
              old4 = 'if(CONFIG.APPS_SCRIPT_URL){var r=await fetch(CONFIG.APPS_SCRIPT_URL);var d=await r.json();'
              new4 = 'if(CONFIG.APPS_SCRIPT_URL){await fetchRecordings();var r=await fetch(CONFIG.APPS_SCRIPT_URL);var d=await r.json();'
              if old4 in html:
                  html = html.replace(old4, new4)
                  changes.append('Added fetchRecordings() call')

          # Change 5: Rewire recording data to use getRecordingData
          old5 = 'recording:getSafe(row,CONFIG.COLS.RECORDING),transcript:getSafe(row,CONFIG.COLS.TRANSCRIPT),aiAnalysis:getSafe(row,CONFIG.COLS.AI_ANALYSIS)'
          if old5 in html:
              pause_search = html.find(old5)
              var_pause = html.rfind('var pause={', max(0, pause_search - 500), pause_search)
              if var_pause >= 0:
                  html = html[:var_pause] + 'var recData=getRecordingData(getSafe(row,CONFIG.COLS.PHONE));' + html[var_pause:]
                  html = html.replace(old5, 'recording:recData.recording,transcript:recData.transcript,aiAnalysis:recData.aiAnalysis')
                  changes.append('Rewired recording data')

          if not changes:
              print('No changes needed - already deployed!')
          else:
              with open('index.html', 'w') as f:
                  f.write(html)
              print(f'Original: {orig_len} chars')
              print(f'Modified: {len(html)} chars')
              print(f'Changes ({len(changes)}):')
              for c in changes:
                  print(f'  - {c}')
          PYEOF
      - name: Commit changes
        run: |
          git config user.name "Marro Retention Bot"
          git config user.email "marro-bot@butternutbox.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: wire hub to load recordings from data/recordings.json"
            git push
            echo "Committed and pushed!"
          fi
      - name: Cleanup
        run: |
          git rm .github/workflows/deploy-recordings.yml
          git rm -f _deploy_test.txt
          git commit -m "chore: remove one-time deploy workflow and test file" || true
          git push || true
