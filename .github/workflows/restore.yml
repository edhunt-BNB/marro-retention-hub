name: Restore Dashboard
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/restore.yml'
permissions:
  contents: write
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and decode dashboard
        run: |
          curl -sL 'https://pub.hyperagent.com/api/published/F4uEhpLVUcNItyT5KD0VFQ/dashboard_b64.txt' -o /tmp/b64.txt
          base64 -d /tmp/b64.txt > index.html
      - name: Verify file
        run: |
          grep -q 'MARRO RETENTION DEEP DIVE' index.html
          grep -q 'Date.UTC(2025' index.html
          grep -q 'Transcript' index.html
          SIZE=$(wc -c < index.html)
          echo "File size: $SIZE bytes"
          test $SIZE -gt 60000
          echo 'ALL CHECKS PASS - Transcript column added'
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'feat: Add Transcript column to pause tables'
          git push
