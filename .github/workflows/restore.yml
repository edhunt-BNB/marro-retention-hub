name: Restore Dashboard
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/restore.yml'
permissions:
  contents: write
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and decode dashboard
        run: |
          curl -sL 'https://pub.hyperagent.com/api/published/2HK6m_o0wnqYpZVREsylnQ/dashboard_b64.txt' -o /tmp/b64.txt
          base64 -d /tmp/b64.txt > index.html
      - name: Verify file
        run: |
          grep -q 'MARRO RETENTION DEEP DIVE' index.html
          grep -q 'RECORDING:37' index.html
          grep -q 'TRANSCRIPT:38' index.html
          grep -q 'AI_ANALYSIS:39' index.html
          grep -q 'p.recording' index.html
          grep -q 'p.transcript' index.html
          grep -q 'p.aiAnalysis' index.html
          SIZE=$(wc -c < index.html)
          echo "File size: $SIZE bytes"
          test $SIZE -gt 60000
          echo 'ALL CHECKS PASS - Recording/Transcript/AI wired to sheet data'
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'feat: Wire Recording/Transcript/AI columns to sheet data (BK:BM)'
          git push
