name: Commit Transcripts Bundle
on: push
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download and unpack transcripts
        run: |
          curl -sL 'https://pub.hyperagent.com/api/published/ZC4CvAQyQNoJ90fTqFS-Zg/transcripts_bundle.json' -o bundle.json
          mkdir -p data/transcripts
          python3 << 'PYEOF'
          import json, os
          with open('bundle.json') as f:
              bundle = json.load(f)
          for phone, content in bundle.items():
              path = f'data/transcripts/{phone}.txt'
              with open(path, 'w') as out:
                  out.write(content)
              print(f'Created {path} ({len(content)} chars)')
          print(f'Total: {len(bundle)} transcripts')
          PYEOF
      - name: Commit transcripts and self-delete
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/transcripts/
          git rm .github/workflows/commit_transcripts.yml
          rm -f bundle.json
          git commit -m 'Add 15 transcripts via Recording Assigner (2026-04-16)'
          git push
