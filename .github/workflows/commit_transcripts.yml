name: Commit Transcripts Bundle
on:
  push:
    paths:
      - '.github/workflows/commit_transcripts.yml'
jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download and unpack transcripts
        run: |
          curl -sL 'https://pub.hyperagent.com/api/published/ZC4CvAQyQNoJ90fTqFS-Zg/transcripts_bundle.json' -o bundle.json
          mkdir -p data/transcripts
          python3 -c 'import json; bundle=json.load(open("bundle.json")); [(open(f"data/transcripts/{p}.txt","w").write(c), print(f"Created {p}.txt ({len(c)} chars)")) for p,c in bundle.items()]; print(f"Total: {len(bundle)} transcripts")'
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/transcripts/
          git rm .github/workflows/commit_transcripts.yml
          rm -f bundle.json
          git commit -m 'Add 15 transcripts via Recording Assigner (2026-04-16)'
          git push
